<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maica Bags</title>
    <style>
        :root {
            --bg-deep: #071f1d;
            --accent-pink: #ffb7d5;
        }
        body { margin: 0; background: var(--bg-deep); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* GALAXIA INFINITA */
        #galaxy-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }

        /* HOME */
        #home { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; position: relative; }
        .brand-title { color: var(--accent-pink); font-size: 5rem; margin-bottom: 20px; text-shadow: 0 0 20px var(--accent-pink); }
        .btn { padding: 15px 40px; background: var(--accent-pink); color: black; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* SIDEBAR Y MENU */
        #sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: rgba(10, 38, 36, 0.98); border-right: 2px solid var(--accent-pink); transition: 0.3s; z-index: 20; display: none; padding-top: 80px; }
        #sidebar.active { left: 0; }
        .menu-btn { display: block; padding: 15px; text-decoration: none; background: var(--accent-pink); color: black; font-weight: bold; margin: 10px; border-radius: 5px; text-align: center; cursor: pointer; }

        /* TIENDA */
        #shop { display: none; min-height: 100vh; padding: 50px; z-index: 5; position: relative; background: radial-gradient(circle at 50% 50%, #1c4d4a, var(--bg-deep)); }
        #category-title { text-align: center; color: var(--accent-pink); font-size: 3rem; margin-bottom: 40px; text-transform: uppercase; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .product-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--accent-pink); }

        /* BOTON WSP GRANDE */
        .wsp-container { text-align: center; margin: 40px 0; }
        .btn-wsp-grande { 
            display: inline-block; 
            padding: 20px 50px; 
            background: var(--accent-pink); 
            color: black; 
            text-decoration: none; 
            border-radius: 50px; 
            font-size: 1.5rem; 
            font-weight: bold; 
            box-shadow: 0 0 20px var(--accent-pink);
            transition: 0.3s;
        }
        .btn-wsp-grande:hover { transform: scale(1.1); }

        /* INFO IMPORTANTE */
        #info-container { background: rgba(7, 31, 29, 0.8); padding: 40px; border-top: 2px solid var(--accent-pink); margin-top: 20px; text-align: center; }
        .info-grid { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; }
        .info-item { width: 250px; }
        .info-item h3 { color: var(--accent-pink); }
    </style>
</head>
<body>

    <canvas id="galaxy-canvas"></canvas>

    <div id="home">
        <h1 class="brand-title">MAICA BAGS</h1>
        <button class="btn" onclick="showShop()">Ver Productos</button>
    </div>

    <button id="menu-toggle" style="display:none; position:fixed; top:20px; left:20px; z-index:21; background:var(--accent-pink); color:black; border:none; padding:10px; cursor:pointer; font-weight:bold; border-radius:5px;" onclick="toggleSidebar()">☰ Menú</button>
    
    <div id="sidebar">
        <a class="menu-btn" onclick="loadCategory('Carteras')">Carteras</a>
        <a class="menu-btn" onclick="loadCategory('Cartucheras')">Cartucheras</a>
        <a class="menu-btn" onclick="loadCategory('Riñoneras')">Riñoneras</a>
        <a class="menu-btn" onclick="loadCategory('Morrales')">Morrales</a>
    </div>

    <div id="shop">
        <h2 id="category-title">Catálogo</h2>
        <div class="product-grid" id="product-grid"></div>

        <div class="wsp-container">
            <a href="https://wa.me/5491126779865?text=Hola!%20Vengo%20de%20la%20web,%20quiero%20consultar%20por%20los%20productos." class="btn-wsp-grande">
                ¡Consultar por WhatsApp! 💬
            </a>
        </div>

        <section id="info-container">
            <h2 style="color: var(--accent-pink);">Información Importante</h2>
            <div class="info-grid">
                <div class="info-item">
                    <h3>Envíos</h3>
                    <p>Realizamos envíos a todo el país. Consultá costos.</p>
                </div>
                <div class="info-item">
                    <h3>Pagos</h3>
                    <p>Aceptamos transferencias, Mercado Pago y efectivo.</p>
                </div>
                <div class="info-item">
                    <h3>Atención</h3>
                    <p>Respondemos todas tus dudas de forma personalizada.</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        function showShop() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('shop').style.display = 'block';
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('menu-toggle').style.display = 'block';
            loadCategory('Catálogo Completo');
        }

        function loadCategory(cat) {
            document.getElementById('category-title').innerText = cat;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = `<div class="product-card"><h3>Próximamente</h3><p>Productos de ${cat} en camino...</p></div>`;
            document.getElementById('sidebar').classList.remove('active');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        function createParticles() {
            particles = [];
            for(let i=0; i<200; i++) {
                particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, speed: Math.random() * 0.5 });
            }
        }
        function animate() {
            ctx.fillStyle = '#071f1d'; ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffb7d5';
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        createParticles(); animate();
    </script>
</body>
</html>
